<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 40px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; }
        form { display: flex; margin-top: 16px; }
        input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; margin-left: 8px; border: none; background: #0078d7; color: #fff; border-radius: 4px; cursor: pointer; }
        button:hover { background: #005fa3; }
        .strikethrough { text-decoration: line-through; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shopping List</h1>
        <h2>Food</h2>
        <ul id="food-list"></ul>
        <form id="food-form">
            <input type="text" id="food-item" placeholder="Add food item..." required />
            <button type="submit">Add</button>
        </form>
        <h2>Household</h2>
        <ul id="household-list"></ul>
        <form id="household-form">
            <input type="text" id="household-item" placeholder="Add household item..." required />
            <button type="submit">Add</button>
        </form>
    </div>
    <script>
        function setupSection(formId, listId, inputId, storageKey) {
            const form = document.getElementById(formId);
            const list = document.getElementById(listId);
            const itemInput = document.getElementById(inputId);

            // Load items from localStorage
            let items = [];
            try {
                items = JSON.parse(localStorage.getItem(storageKey)) || [];
            } catch (e) { items = []; }

            function saveItems() {
                localStorage.setItem(storageKey, JSON.stringify(items));
            }

            function renderItems() {
                list.innerHTML = '';
                // Unchecked first, then checked
                const unchecked = items.filter(i => !i.checked);
                const checked = items.filter(i => i.checked);
                function renderList(arr) {
                    arr.forEach(item => {
                        const li = document.createElement('li');
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.style.marginRight = '8px';
                        checkbox.checked = !!item.checked;
                        const span = document.createElement('span');
                        span.textContent = item.text;
                        if (item.checked) span.classList.add('strikethrough');
                        checkbox.addEventListener('change', function() {
                            item.checked = checkbox.checked;
                            saveItems();
                            renderItems();
                        });
                        li.appendChild(checkbox);
                        li.appendChild(span);
                        list.appendChild(li);
                    });
                }
                renderList(unchecked);
                renderList(checked);
            }

            renderItems();

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const value = itemInput.value.trim();
                if (value) {
                    items.push({ text: value, checked: false });
                    saveItems();
                    renderItems();
                    itemInput.value = '';
                }
            });
        }
        setupSection('food-form', 'food-list', 'food-item', 'shoppingListFood');
        setupSection('household-form', 'household-list', 'household-item', 'shoppingListHousehold');
    </script>
</body>
</html>
